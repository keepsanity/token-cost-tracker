<div id="token_cost_tracker_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Token Cost Tracker</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <!-- Enable/Disable -->
                <label class="checkbox_label" for="tct_enabled">
                    <input id="tct_enabled" type="checkbox" />
                    <span>Enable Cost Tracking</span>
                </label>

                <!-- Auto Delete -->
                <label class="checkbox_label" for="tct_auto_delete">
                    <input id="tct_auto_delete" type="checkbox" />
                    <span>Auto-delete after 30 days</span>
                </label>

                <hr class="m-t-1 m-b-1">

                <!-- Open Button -->
                <div id="tct_open_popup" class="menu_button">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Open Token Cost Tracker</span>
                </div>
            </div>
        </div>
    </div>
</div>
